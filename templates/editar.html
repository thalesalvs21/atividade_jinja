{% extends "base.html" %}

{% block titulo %}Editar Livro — Biblioteca{% endblock %}

{% block conteudo %}
<form method="POST" action="/editar/{{ livro.isbn }}">
    <div>
        <label>ISBN:</label>
        <input type="text" id="isbn" name="isbn" value="{{ livro.isbn }}" required>
    </div>
    <div>
        <label>Título:</label>
        <input type="text" id="titulo" name="titulo" value="{{ livro.titulo }}" required>
    </div>
    <div>
        <label>Autor:</label>
        <input type="text" id="autor" name="autor" value="{{ livro.autor }}" required>
    </div>
    <div>
        <label>Ano de Publicação:</label>
        <input type="number" id="ano_publicacao" name="ano_publicacao" value="{{ livro.ano_publicacao }}" required>
    </div>
    <div>
        <label>Gênero:</label>
        <input type="text" id="genero" name="genero" value="{{ livro.genero }}" required>
    </div>
    <div>
        <label>Situação:</label>
        <select id="status" name="status">
            <option value="disponivel" {% if livro.status == "disponivel" %}selected{% endif %}>Disponível</option>
            <option value="emprestado" {% if livro.status == "emprestado" %}selected{% endif %}>Emprestado</option>
        </select>
    </div>
    <button type="submit">Atualizar</button>
</form>
{% endblock %}
